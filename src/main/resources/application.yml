spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:example}
  application:
    name: cueb-agent-demo

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cueb_agent?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.cueb.demo.classroom.entity
  configuration:
    map-underscore-to-camel-case: true
